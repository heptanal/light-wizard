[network]
# Leave empty for automatic UDP discovery. Addresses are useful on LANs that
# suppress broadcasts: ["192.168.1.41", "192.168.1.42"]
lights = []
# Optional directed broadcast addresses, for example ["192.168.1.255"].
broadcasts = []
port = 38899
discovery_seconds = 3.0
request_timeout_ms = 750
restore_state = true

[player]
# In file mode, analyze samples immediately and play the same audio this many
# milliseconds later. Tune by ear for the lights, Wi-Fi, and output device.
playback_delay_ms = 150

[visualizer]
# Maximum WiZ network frames per second. Supported range: 1-30; unchanged
# frames are suppressed even at the default maximum.
fps = 30
# These two settings apply only to ScreenCaptureKit system-audio capture. Audio
# files are analyzed and played at their native sample rate and channel count.
sample_rate = 48000
channels = 2
fft_size = 2048

# Input level mapping.
sensitivity = 1.35
floor_db = -58.0
ceiling_db = 0.0
brightness_min = 8
brightness_max = 100
attack_ms = 15.0
release_ms = 90.0

# Adaptive beat detection.
beat_threshold = 1.25
beat_boost = 0.35
beat_cooldown_ms = 180
# Move the current chord-tone colors to the next bulb on every beat.
rotate_colors_on_beat = true

# "pitch" maps C through B to stable colors and distributes chord tones across
# multiple lights. "drift" restores the original continuously moving palette.
color_mode = "pitch"

# Colors are interpolated, wrap back to the beginning, and form the 12-note
# color wheel in pitch mode (C starts at the first palette color).
palette = ["#ff2a68", "#7b2cff", "#008cff", "#00e5b0", "#ffd43b"]

# Pitch stabilization. This confidence value is where tracking reaches full
# speed; uncertain music still changes color more gently, while silence holds.
pitch_smoothing_ms = 50.0
pitch_min_confidence = 0.10

# Legacy drift-mode controls; ignored in pitch mode.
color_speed = 0.035
color_influence = 0.65
spatial_spread = 0.14

# Suppress imperceptibly small network updates.
change_threshold = 5

# Native WiZ pulse command in addition to normal setPilot animation.
pulse_on_beat = true
pulse_delta = 25
pulse_duration_ms = 80
